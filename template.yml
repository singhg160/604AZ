AWSTemplateFormatVersion: '2010-09-09'
Description: Carbon Footprint Full Stack (Port 3001)

Parameters:
  StudentNumber:
    Type: String

  BackendImage:
    Type: String

Resources:

# ------------------------
# 🌐 VPC
# ------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

# ------------------------
# 🌍 SUBNETS
# ------------------------

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: eu-west-2a

  PrivateSubnet:
    Value: !GetAtt ALB.DNSName
