name: Docker Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr  # <--- THIS ID MUST MATCH THE ONE BELOW
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          # This line was likely missing the ".outputs" part or the ID didn't match
          REGISTRY: ${{ steps.login-ecr.outputs.registry }} 
          REPO: carbon-backend
          IMAGE_TAG: latest
        run: |
          # Now $REGISTRY will look like: 891377043411.dkr.ecr.us-east-1.amazonaws.com
          docker build --platform linux/amd64 -t $REGISTRY/$REPO:$IMAGE_TAG .
          docker push $REGISTRY/$REPO:$IMAGE_TAG

      - name: Deploy to CloudFormation
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: CarbonFootprintStack
          template: template.yaml
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
          parameter-overrides: >-
            StudentNumber=${{ secrets.STUDENT_ID }},
            BackendImage=${{ steps.login-ecr.registry }}/carbon-backend:latest
